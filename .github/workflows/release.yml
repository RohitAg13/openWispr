name: Release

# Push a tag like v0.1.0 to build the Android APK + macOS DMG and attach them to a GitHub
# Release. `workflow_dispatch` lets you dry-run the builds (artifacts only, no Release) by hand.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release and upload assets

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake (whisper.cpp + llama.cpp native modules)
        run: |
          sdkmanager "ndk;25.1.8937393" "ndk;29.0.13113456" "cmake;3.22.1" "cmake;3.31.6"

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.OPENWISPR_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::OPENWISPR_KEYSTORE_BASE64 secret is not set. See .github/RELEASING.md."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        working-directory: android
        env:
          OPENWISPR_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          OPENWISPR_KEYSTORE_PASSWORD: ${{ secrets.OPENWISPR_KEYSTORE_PASSWORD }}
          OPENWISPR_KEY_ALIAS: ${{ secrets.OPENWISPR_KEY_ALIAS }}
          OPENWISPR_KEY_PASSWORD: ${{ secrets.OPENWISPR_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Stage APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk \
             "dist/OpenWispr-${GITHUB_REF_NAME:-dev}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*.apk

  macos:
    name: macOS DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: macos/App
        run: ./generate.sh

      - name: Build + package DMG (ad-hoc signed)
        env:
          SIGN_IDENTITY: "-"   # ad-hoc; CI has no keychain identity (not notarized)
        run: bash macos/scripts/package-dmg.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: macos/dist/*.dmg

  release:
    name: Publish GitHub Release
    needs: [android, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release with APK + DMG
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android-apk/*.apk
            artifacts/macos-dmg/*.dmg
          generate_release_notes: true
          body: |
            On-device voice dictation. Download the build for your platform below.

            **Android** (`.apk`): sideload it — enable "Install unknown apps" for your browser/files app, then open the APK. arm64 devices only.

            **macOS** (`.dmg`): the app is self-signed, not notarized, so on first launch macOS Gatekeeper will warn. Right-click the app → **Open** (once), or run `xattr -dr com.apple.quarantine /Applications/OpenWispr.app`.
