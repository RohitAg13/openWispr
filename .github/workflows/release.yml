name: Release

# Push a tag like v0.1.0 to build the Android APK + macOS DMG and attach them to a GitHub
# Release. `workflow_dispatch` lets you dry-run the builds (artifacts only, no Release) by hand.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create the Release and upload assets

jobs:
  android:
    name: Android APK + AAB
    runs-on: ubuntu-latest
    env:
      # Present only once the Play service account is configured (see .github/RELEASING.md).
      # Referenced in the guarded fastlane step's `if:` — secrets aren't visible to `if` directly,
      # so we surface it here as a job-level env var.
      PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake (whisper.cpp + llama.cpp native modules)
        run: |
          sdkmanager "ndk;25.1.8937393" "ndk;29.0.13113456" "cmake;3.22.1" "cmake;3.31.6"

      - name: Fetch vendored sherpa-onnx AAR (on-device Parakeet STT; gitignored binary)
        working-directory: android
        run: |
          mkdir -p app/libs
          curl -fSL --retry 3 -o app/libs/sherpa-onnx-static-link-onnxruntime-1.13.3.aar \
            https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.3/sherpa-onnx-static-link-onnxruntime-1.13.3.aar

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.OPENWISPR_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::OPENWISPR_KEYSTORE_BASE64 secret is not set. See .github/RELEASING.md."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK + AAB
        working-directory: android
        env:
          OPENWISPR_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          OPENWISPR_KEYSTORE_PASSWORD: ${{ secrets.OPENWISPR_KEYSTORE_PASSWORD }}
          OPENWISPR_KEY_ALIAS: ${{ secrets.OPENWISPR_KEY_ALIAS }}
          OPENWISPR_KEY_PASSWORD: ${{ secrets.OPENWISPR_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon

      - name: Stage APK + AAB
        run: |
          mkdir -p dist
          # Sanitize the ref: workflow_dispatch on a branch (e.g. feat/x) has slashes in
          # GITHUB_REF_NAME, which would be read as directories. Tags (v1.0.0) are unaffected.
          NAME="${GITHUB_REF_NAME:-dev}"
          NAME="${NAME//\//-}"
          cp android/app/build/outputs/apk/release/app-release.apk "dist/OpenWispr-${NAME}.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "dist/OpenWispr-${NAME}.aab"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: dist/*.aab

      # ---- Play Store upload (internal track) ----
      # Runs only on a tag build AND once the PLAY_SERVICE_ACCOUNT_JSON secret exists. The very
      # first upload must be done manually in the Play Console (Google requires it) — after that,
      # every tagged release auto-publishes the AAB to the internal testing track via fastlane.
      - name: Set up Ruby (fastlane)
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.PLAY_JSON != '' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: android

      - name: Upload AAB to Play internal track (fastlane)
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.PLAY_JSON != '' }}
        working-directory: android
        env:
          AAB_PATH: ${{ github.workspace }}/android/app/build/outputs/bundle/release/app-release.aab
        run: |
          printf '%s' "$PLAY_JSON" > "$RUNNER_TEMP/play.json"
          export PLAY_JSON_KEY_FILE="$RUNNER_TEMP/play.json"
          bundle exec fastlane internal

  macos:
    name: macOS DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fetch vendored sherpa-onnx xcframeworks (on-device Parakeet STT; gitignored binaries)
        run: bash macos/SherpaOnnxFramework/fetch-binaries.sh

      - name: Generate Xcode project
        working-directory: macos/App
        run: ./generate.sh

      - name: Build + package DMG (ad-hoc signed)
        env:
          SIGN_IDENTITY: "-"   # ad-hoc; CI has no keychain identity (not notarized)
        run: bash macos/scripts/package-dmg.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: macos/dist/*.dmg

  release:
    name: Publish GitHub Release
    needs: [android, macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release with APK + DMG
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/android-apk/*.apk
            artifacts/macos-dmg/*.dmg
          generate_release_notes: true
          body: |
            On-device voice dictation. Download the build for your platform below.

            **Android** (`.apk`): sideload it — enable "Install unknown apps" for your browser/files app, then open the APK. arm64 devices only.

            **macOS** (`.dmg`): the app is self-signed, not notarized, so on first launch macOS Gatekeeper will warn. Right-click the app → **Open** (once), or run `xattr -dr com.apple.quarantine /Applications/OpenWispr.app`.
