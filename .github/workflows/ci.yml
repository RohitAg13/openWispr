name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  android:
    name: Android build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake (whisper.cpp + llama.cpp native modules)
        run: sdkmanager "ndk;25.1.8937393" "ndk;29.0.13113456" "cmake;3.22.1" "cmake;3.31.6"

      - name: Assemble debug + run unit tests
        working-directory: android
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest --no-daemon
