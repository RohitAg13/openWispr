name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  android:
    name: Android build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug + run unit tests
        working-directory: android
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest --no-daemon

# Note: the eval harness (eval/textproc_cli/build.sh) single-sources the deterministic
# pipeline from android/ and compiles it with Android Studio's bundled kotlinc, so it is
# validated locally rather than in CI. See eval/README.md.
